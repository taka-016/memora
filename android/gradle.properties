org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
kotlin.daemon.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m
android.useAndroidX=true
android.enableJetifier=true
# Flutter migratorにより追加されたBuilt-in Kotlin無効化フラグ
android.builtInKotlin=false
# Flutter migratorにより追加された新DSL無効化フラグ
android.newDsl=false
